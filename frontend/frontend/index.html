<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quote Generator</title>
</head>
<body>
    <h1>Random Quote</h1>
    <div id="quote-box">
        <p id="text">Press the button to get a quote!</p>
        <p><b id="author"></b></p>
    </div>
    <button id="new-quote">Get New Quote</button>

    <script>
        // Пока работаем локально. Когда задеплою бэкенд, заменю этот адрес!
        const API_URL = "https://r4rp3uxww47levbl0murcysk.178.105.39.91.sslip.io/quote";

        const btn = document.getElementById("new-quote");
        const textElem = document.getElementById("text");
        const authorElem = document.getElementById("author");

        btn.addEventListener("click", () => {
            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    textElem.innerText = data.quote;
                    authorElem.innerText = data.author;
                })
                .catch(err => console.error("Error fetching quote:", err));
        });
    </script>
</body>
</html>
